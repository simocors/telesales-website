  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

a8a;\n  --blue-4: #0f1f52;\n\n  /* neutrals */\n  --fg:      #f5f3ee;\n  --fg-soft: #c9c8c0;\n  --fg-dim:  #8a8a80;\n  --fg-mute: #55554e;\n\n  /* live */\n  --live: #22c55e;\n  --warn: #f59e0b;\n\n  /* gradients */\n  --grad-gold: linear-gradient(135deg, #f5e7a8 0%, #d4af37 45%, #7a5e18 100%);\n  --grad-gold-soft: linear-gradient(135deg, rgba(245,231,168,.20), rgba(212,175,55,.06) 60%, transparent);\n  --grad-blue: linear-gradient(135deg, #7da3ff 0%, #3b5fb8 50%, #0f1f52 100%);\n  --grad-mixed: linear-gradient(120deg, #f5e7a8 0%, #d4af37 30%, #4d78e8 70%, #1e3a8a 100%);\n  --grad-hero-bg: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(61,95,184,.22), transparent 55%),\n                   radial-gradient(ellipse 70% 50% at 85% 30%, rgba(212,175,55,.16), transparent 60%),\n                   radial-gradient(ellipse 90% 70% at 50% 100%, rgba(15,31,82,.30), transparent 55%);\n\n  /* radii */\n  --r-sm: 6px;\n  --r-md: 10px;\n  --r-lg: 18px;\n  --r-xl: 28px;\n  --r-pill: 999px;\n\n  /* motion */\n  --ease: cubic-bezier(.2,.8,.2,1);\n  --ease-out: cubic-bezier(.16,1,.3,1);\n\n  /* type */\n  --font-display: \"Fraunces\", \"Newsreader\", ui-serif, Georgia, serif;\n  --font-sans:    \"Geist\", \"Söhne\", -apple-system, BlinkMacSystemFont, sans-serif;\n  --font-mono:    \"JetBrains Mono\", ui-monospace, SFMono-Regular, Menlo, monospace;\n}\n\nhtml[data-theme=\"light\"] {\n  --ink-0: #fbfaf5;\n  --ink-1: #f5f3ec;\n  --ink-2: #efece2;\n  --ink-3: #e6e2d3;\n  --ink-4: #d8d3be;\n  --line:  rgba(10,10,18,.08);\n  --line-2:rgba(10,10,18,.16);\n  --fg:      #0a0a12;\n  --fg-soft: #2a2a36;\n  --fg-dim:  #5a5a55;\n  --fg-mute: #8a8a80;\n  --grad-hero-bg: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(61,95,184,.14), transparent 55%),\n                   radial-gradient(ellipse 70% 50% at 85% 30%, rgba(212,175,55,.22), transparent 60%);\n}\n\n/* accent variants (tweak) */\nhtml[data-accent=\"orange\"] {\n  --gold-0: #ffd9b8; --gold-1: #ffb47a; --gold-2: #ff6b35;\n  --gold-3: #d84e1a; --gold-4: #7a2b0c;\n  --grad-gold: linear-gradient(135deg, #ffd9b8 0%, #ff6b35 50%, #d84e1a 100%);\n  --grad-gold-soft: linear-gradient(135deg, rgba(255,180,122,.22), rgba(255,107,53,.06) 60%, transparent);\n  --grad-mixed: linear-gradient(120deg, #ffb47a 0%, #ff6b35 35%, #4d78e8 70%, #1e3a8a 100%);\n  --line-gold: rgba(255,107,53,.30);\n}\nhtml[data-accent=\"emerald\"] {\n  --gold-0: #b7f5d4; --gold-1: #6ee7a8; --gold-2: #10b981;\n  --gold-3: #047857; --gold-4: #064e3b;\n  --grad-gold: linear-gradient(135deg, #b7f5d4 0%, #10b981 50%, #047857 100%);\n  --grad-gold-soft: linear-gradient(135deg, rgba(110,231,168,.22), rgba(16,185,129,.06) 60%, transparent);\n  --grad-mixed: linear-gradient(120deg, #6ee7a8 0%, #10b981 35%, #4d78e8 70%, #1e3a8a 100%);\n  --line-gold: rgba(16,185,129,.3);\n}\nhtml[data-accent=\"violet\"] {\n  --gold-0: #e2d2ff; --gold-1: #b794ff; --gold-2: #8b5cf6;\n  --gold-3: #6d28d9; --gold-4: #3b1379;\n  --grad-gold: linear-gradient(135deg, #e2d2ff 0%, #8b5cf6 50%, #6d28d9 100%);\n  --grad-gold-soft: linear-gradient(135deg, rgba(183,148,255,.22), rgba(139,92,246,.06) 60%, transparent);\n  --grad-mixed: linear-gradient(120deg, #b794ff 0%, #8b5cf6 35%, #4d78e8 70%, #1e3a8a 100%);\n  --line-gold: rgba(139,92,246,.30);\n}\n\n/* =========== base =========== */\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; background: var(--ink-1); color: var(--fg); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\nhtml { scroll-behavior: smooth; scroll-padding-top: 88px; }\nbody { overflow-x: hidden; min-height: 100svh; }\na { color: inherit; text-decoration: none; }\nbutton { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }\nimg, svg { display: block; max-width: 100%; }\n\n.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }\n@media (max-width: 640px) { .container { padding: 0 20px; } }\n\n.mono { font-family: var(--font-mono); font-feature-settings: \"ss01\",\"ss02\"; }\n.display { font-family: var(--font-display); font-weight: 300; letter-spacing: -.02em; }\n.eyebrow { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .18em; font-size: 11px; color: var(--fg-dim); font-weight: 500; }\n\n.badge-live {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 7px 14px 7px 10px;\n  font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase;\n  color: var(--fg-soft);\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line-2);\n  border-radius: var(--r-pill);\n  backdrop-filter: blur(10px);\n}\n.badge-live .dot {\n  width: 7px; height: 7px; border-radius: 50%; background: var(--live);\n  box-shadow: 0 0 0 0 rgba(34,197,94,.55);\n  animation: pulse 1.8s ease-in-out infinite;\n}\n@keyframes pulse {\n  0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.55); }\n  70%  { box-shadow: 0 0 0 8px rgba(34,197,94,0); }\n  100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }\n}\n\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 10px;\n  padding: 14px 22px;\n  border-radius: var(--r-pill);\n  font-weight: 500; font-size: 15px; letter-spacing: -.005em;\n  transition: transform .3s var(--ease), box-shadow .3s var(--ease), background .3s var(--ease);\n  position: relative; overflow: hidden;\n  white-space: nowrap;\n}\n.btn-primary {\n  color: var(--ink-0);\n  background: var(--grad-gold);\n  box-shadow: 0 1px 0 rgba(255,255,255,.25) inset, 0 10px 24px -10px rgba(212,175,55,.55);\n}\n.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 1px 0 rgba(255,255,255,.4) inset, 0 16px 30px -8px rgba(212,175,55,.65); }\n.btn-ghost {\n  color: var(--fg);\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line-2);\n  backdrop-filter: blur(10px);\n}\n.btn-ghost:hover { background: rgba(255,255,255,.06); border-color: var(--line-gold); }\n.btn .arrow { transition: transform .3s var(--ease); }\n.btn:hover .arrow { transform: translateX(3px); }\n\n.gold-text {\n  background: var(--grad-gold);\n  -webkit-background-clip: text; background-clip: text;\n  -webkit-text-fill-color: transparent;\n}\n.mixed-text {\n  background: var(--grad-mixed);\n  -webkit-background-clip: text; background-clip: text;\n  -webkit-text-fill-color: transparent;\n}\n\n/* reveal */\n.reveal { opacity: 0; transform: translateY(20px); transition: opacity .9s var(--ease-out), transform .9s var(--ease-out); }\n.reveal.in { opacity: 1; transform: none; }\n.reveal.d-1 { transition-delay: .05s; }\n.reveal.d-2 { transition-delay: .1s; }\n.reveal.d-3 { transition-delay: .15s; }\n.reveal.d-4 { transition-delay: .2s; }\n.reveal.d-5 { transition-delay: .25s; }\n.reveal.d-6 { transition-delay: .3s; }\n\n/* =========== navbar =========== */\n.nav {\n  position: fixed; top: 0; left: 0; right: 0; z-index: 50;\n  transition: background .4s var(--ease), border-color .4s var(--ease), backdrop-filter .4s;\n  border-bottom: 1px solid transparent;\n}\n.nav.scrolled {\n  background: color-mix(in oklab, var(--ink-0) 72%, transparent);\n  backdrop-filter: saturate(160%) blur(18px);\n  -webkit-backdrop-filter: saturate(160%) blur(18px);\n  border-bottom-color: var(--line);\n}\n.nav-inner {\n  display: flex; align-items: center; justify-content: space-between;\n  height: 72px;\n}\n.logo {\n  display: inline-flex; align-items: center; gap: 10px;\n  font-family: var(--font-display); font-size: 20px; font-weight: 400; letter-spacing: -.01em;\n}\n.logo-mark {\n  width: 28px; height: 28px; border-radius: 8px;\n  background: var(--grad-gold);\n  display: grid; place-items: center;\n  color: var(--ink-0); font-family: var(--font-mono); font-weight: 700; font-size: 14px;\n  box-shadow: 0 0 0 1px rgba(255,255,255,.1) inset, 0 4px 10px -4px rgba(212,175,55,.6);\n}\n.logo .dot-it { color: var(--gold-2); }\n.nav-links { display: flex; gap: 28px; align-items: center; }\n.nav-links a {\n  font-size: 14px; color: var(--fg-soft); transition: color .2s;\n}\n.nav-links a:hover { color: var(--fg); }\n.nav-right { display: flex; gap: 12px; align-items: center; }\n.lang-switch {\n  display: inline-flex; border: 1px solid var(--line-2); border-radius: var(--r-pill); overflow: hidden;\n  font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em;\n}\n.lang-switch button {\n  padding: 6px 10px; color: var(--fg-dim); transition: all .2s;\n}\n.lang-switch button.active { background: var(--fg); color: var(--ink-0); }\n@media (max-width: 760px) {\n  .nav-links { display: none; }\n}\n\n/* =========== hero =========== */\n.hero {\n  position: relative;\n  padding: 140px 0 120px;\n  min-height: 100svh;\n  display: flex; align-items: center;\n  overflow: hidden;\n}\n.hero-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; background: var(--grad-hero-bg); }\n.hero-grid-lines {\n  position: absolute; inset: 0; z-index: 0; pointer-events: none;\n  background-image:\n    linear-gradient(to right, var(--line) 1px, transparent 1px),\n    linear-gradient(to bottom, var(--line) 1px, transparent 1px);\n  background-size: 80px 80px;\n  mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 30%, transparent 80%);\n  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 30%, transparent 80%);\n  opacity: .45;\n}\n.hero-orb {\n  position: absolute; border-radius: 50%;\n  filter: blur(60px);\n  pointer-events: none; z-index: 0;\n  animation: drift 22s ease-in-out infinite alternate;\n}\n.hero-orb.o1 { width: 520px; height: 520px; top: -120px; left: -120px; background: radial-gradient(circle, rgba(212,175,55,.22), transparent 60%); }\n.hero-orb.o2 { width: 620px; height: 620px; bottom: -180px; right: -180px; background: radial-gradient(circle, rgba(30,58,138,.32), transparent 60%); animation-delay: -6s; }\n.hero-orb.o3 { width: 300px; height: 300px; top: 40%; left: 50%; transform: translate(-50%,-50%); background: radial-gradient(circle, rgba(77,120,232,.18), transparent 60%); animation-delay: -12s; }\n@keyframes drift {\n  0% { transform: translate3d(0,0,0) scale(1); }\n  100% { transform: translate3d(30px,-20px,0) scale(1.08); }\n}\n.hero-inner {\n  position: relative; z-index: 1;\n  display: grid; grid-template-columns: 1.15fr 1fr; gap: 64px; align-items: center;\n}\n@media (max-width: 980px) {\n  .hero-inner { grid-template-columns: 1fr; gap: 48px; }\n}\n.hero-headline {\n  font-family: var(--font-display); font-weight: 300;\n  font-size: clamp(44px, 7.5vw, 104px);\n  line-height: .96; letter-spacing: -.035em;\n  margin: 20px 0 24px;\n}\n.hero-headline .line { display: block; overflow: hidden; }\n.hero-headline em { font-style: italic; font-weight: 300; }\n.hero-headline .emph {\n  font-style: italic;\n  background: var(--grad-gold);\n  -webkit-background-clip: text; background-clip: text;\n  -webkit-text-fill-color: transparent;\n  font-weight: 400;\n}\n.hero-sub {\n  font-size: clamp(16px, 1.3vw, 19px);\n  line-height: 1.5; color: var(--fg-soft);\n  max-width: 520px; margin-bottom: 32px;\n  text-wrap: pretty;\n}\n.hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }\n.hero-meta {\n  margin-top: 40px;\n  display: flex; gap: 36px; flex-wrap: wrap;\n  padding-top: 32px; border-top: 1px solid var(--line);\n}\n.hero-meta .kv { display: flex; flex-direction: column; gap: 4px; }\n.hero-meta .kv .n {\n  font-family: var(--font-display); font-size: 28px; font-weight: 400; letter-spacing: -.02em;\n}\n.hero-meta .kv .l {\n  font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .14em; color: var(--fg-dim);\n}\n\n/* hero visual: waveform stage */\n.hero-visual {\n  position: relative;\n  aspect-ratio: 4/5;\n  border: 1px solid var(--line-2);\n  border-radius: var(--r-xl);\n  background:\n    radial-gradient(ellipse 70% 50% at 50% 30%, rgba(212,175,55,.14), transparent 60%),\n    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0) 50%),\n    var(--ink-2);\n  overflow: hidden;\n  box-shadow:\n    0 1px 0 rgba(255,255,255,.06) inset,\n    0 60px 120px -40px rgba(0,0,0,.6),\n    0 0 0 1px var(--line) inset;\n}\n.hero-visual::before {\n  content: \"\"; position: absolute; inset: 0;\n  background:\n    repeating-linear-gradient(0deg, transparent 0 60px, rgba(255,255,255,.025) 60px 61px),\n    repeating-linear-gradient(90deg, transparent 0 60px, rgba(255,255,255,.025) 60px 61px);\n  pointer-events: none;\n}\n.hero-visual-head {\n  position: absolute; top: 20px; left: 20px; right: 20px;\n  display: flex; justify-content: space-between; align-items: center;\n  font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-dim);\n  letter-spacing: .1em; text-transform: uppercase;\n}\n.hero-visual-head .live { color: var(--live); display: inline-flex; align-items: center; gap: 6px; }\n.hero-visual-head .live::before { content: \"\"; width: 6px; height: 6px; background: var(--live); border-radius: 50%; animation: pulse 1.8s infinite; }\n.hero-visual-center {\n  position: absolute; inset: 0; display: grid; place-items: center;\n}\n.wave-stage {\n  width: 82%;\n  display: flex; align-items: center; justify-content: center; gap: 3px;\n  height: 50%;\n}\n.wave-stage .bar {\n  flex: 1; min-width: 2px; max-width: 5px;\n  background: var(--grad-gold);\n  border-radius: 3px;\n  transform-origin: center;\n  box-shadow: 0 0 10px rgba(212,175,55,.2);\n  transition: height .1s linear, opacity .2s;\n}\n.hero-visual-foot {\n  position: absolute; bottom: 20px; left: 20px; right: 20px;\n  display: flex; justify-content: space-between; align-items: center;\n  font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-dim);\n  letter-spacing: .1em; text-transform: uppercase;\n}\n.hero-visual .caller {\n  position: absolute; top: 50%; left: 20px; right: 20px;\n  transform: translateY(-50%);\n  pointer-events: none;\n  display: flex; justify-content: space-between; align-items: center;\n  opacity: .55;\n}\n.hero-visual .caller .c-name { font-family: var(--font-display); font-size T','Tommaso','BANDI & INVESTITORI', 0, 'off'],\n  ];\n  const af = $('#agentsFull');\n  if (af) af.innerHTML = agentsData.map(([i,n,r,c,s,g]) => `\n    <div class=\"agent-row\">\n      <div class=\"agent-av ${g?'g':''}\">${i}<\u002Fdiv>\n      <div><div class=\"n\">${n}<\u002Fdiv><div class=\"r\">${r}<\u002Fdiv><\u002Fdiv>\n      <div class=\"cnt\">${c}<\u002Fdiv>\n      <span class=\"stat ${s}\">${s === 'on' ? 'Live' : s === 'idle' ? 'Stand-by' : 'Offline'}<\u002Fspan>\n    <\u002Fdiv>\n  `).join('');\n\n  // call row selection\n  document.querySelectorAll('#liveCalls .call-row').forEach(r => {\n    r.addEventListener('click', () => {\n      document.querySelectorAll('#liveCalls .call-row').forEach(x => x.classList.remove('active-call'));\n      r.classList.add('active-call');\n      $('#tTitle').textContent = r.querySelector('.n').textContent;\n    });\n  });\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
