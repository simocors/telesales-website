  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

i landing\n   Palette: nero profondo + oro + blu notte\n   ========================================================= */\n\n:root {\n  /* ink */\n  --ink-0: #050509;\n  --ink-1: #0a0a12;\n  --ink-2: #10101c;\n  --ink-3: #16172a;\n  --ink-4: #1f2038;\n  --line:  rgba(255,255,255,.08);\n  --line-2:rgba(255,255,255,.14);\n  --line-gold: rgba(212,175,55,.28);\n\n  /* gold */\n  --gold-0: #f5e7a8;\n  --gold-1: #e8c86a;\n  --gold-2: #d4af37;\n  --gold-3: #b8922a;\n  --gold-4: #7a5e18;\n\n  /* blue */\n  --blue-0: #7da3ff;\n  --blue-1: #4d78e8;\n  --blue-2: #3b5fb8;\n  --blue-3: #1e3a8a;\n  --blue-4: #0f1f52;\n\n  /* neutrals */\n  --fg:      #f5f3ee;\n  --fg-soft: #c9c8c0;\n  --fg-dim:  #8a8a80;\n  --fg-mute: #55554e;\n\n  /* live */\n  --live: #22c55e;\n  --warn: #f59e0b;\n\n  /* gradients */\n  --grad-gold: linear-gradient(135deg, #f5e7a8 0%, #d4af37 45%, #7a5e18 100%);\n  --grad-gold-soft: linear-gradient(135deg, rgba(245,231,168,.20), rgba(212,175,55,.06) 60%, transparent);\n  --grad-blue: linear-gradient(135deg, #7da3ff 0%, #3b5fb8 50%, #0f1f52 100%);\n  --grad-mixed: linear-gradient(120deg, #f5e7a8 0%, #d4af37 30%, #4d78e8 70%, #1e3a8a 100%);\n  --grad-hero-bg: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(61,95,184,.22), transparent 55%),\n                   radial-gradient(ellipse 70% 50% at 85% 30%, rgba(212,175,55,.16), transparent 60%),\n                   radial-gradient(ellipse 90% 70% at 50% 100%, rgba(15,31,82,.30), transparent 55%);\n\n  /* radii */\n  --r-sm: 6px;\n  --r-md: 10px;\n  --r-lg: 18px;\n  --r-xl: 28px;\n  --r-pill: 999px;\n\n  /* motion */\n  --ease: cubic-bezier(.2,.8,.2,1);\n  --ease-out: cubic-bezier(.16,1,.3,1);\n\n  /* type */\n  --font-display: \"Fraunces\", \"Newsreader\", ui-serif, Georgia, serif;\n  --font-sans:    \"Geist\", \"Söhne\", -apple-system, BlinkMacSystemFont, sans-serif;\n  --font-mono:    \"JetBrains Mono\", ui-monospace, SFMono-Regular, Menlo, monospace;\n}\n\nhtml[data-theme=\"light\"] {\n  --ink-0: #fbfaf5;\n  --ink-1: #f5f3ec;\n  --ink-2: #efece2;\n  --ink-3: #e6e2d3;\n  --ink-4: #d8d3be;\n  --line:  rgba(10,10,18,.08);\n  --line-2:rgba(10,10,18,.16);\n  --fg:      #0a0a12;\n  --fg-soft: #2a2a36;\n  --fg-dim:  #5a5a55;\n  --fg-mute: #8a8a80;\n  --grad-hero-bg: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(61,95,184,.14), transparent 55%),\n                   radial-gradient(ellipse 70% 50% at 85% 30%, rgba(212,175,55,.22), transparent 60%);\n}\n\n/* accent variants (tweak) */\nhtml[data-accent=\"orange\"] {\n  --gold-0: #ffd9b8; --gold-1: #ffb47a; --gold-2: #ff6b35;\n  --gold-3: #d84e1a; --gold-4: #7a2b0c;\n  --grad-gold: linear-gradient(135deg, #ffd9b8 0%, #ff6b35 50%, #d84e1a 100%);\n  --grad-gold-soft: linear-gradient(135deg, rgba(255,180,122,.22), rgba(255,107,53,.06) 60%, transparent);\n  --grad-mixed: linear-gradient(120deg, #ffb47a 0%, #ff6b35 35%, #4d78e8 70%, #1e3a8a 100%);\n  --line-gold: rgba(255,107,53,.30);\n}\nhtml[data-accent=\"emerald\"] {\n  --gold-0: #b7f5d4; --gold-1: #6ee7a8; --gold-2: #10b981;\n  --gold-3: #047857; --gold-4: #064e3b;\n  --grad-gold: linear-gradient(135deg, #b7f5d4 0%, #10b981 50%, #047857 100%);\n  --grad-gold-soft: linear-gradient(135deg, rgba(110,231,168,.22), rgba(16,185,129,.06) 60%, transparent);\n  --grad-mixed: linear-gradient(120deg, #6ee7a8 0%, #10b981 35%, #4d78e8 70%, #1e3a8a 100%);\n  --line-gold: rgba(16,185,129,.3);\n}\nhtml[data-accent=\"violet\"] {\n  --gold-0: #e2d2ff; --gold-1: #b794ff; --gold-2: #8b5cf6;\n  --gold-3: #6d28d9; --gold-4: #3b1379;\n  --grad-gold: linear-gradient(135deg, #e2d2ff 0%, #8b5cf6 50%, #6d28d9 100%);\n  --grad-gold-soft: linear-gradient(135deg, rgba(183,148,255,.22), rgba(139,92,246,.06) 60%, transparent);\n  --grad-mixed: linear-gradient(120deg, #b794ff 0%, #8b5cf6 35%, #4d78e8 70%, #1e3a8a 100%);\n  --line-gold: rgba(139,92,246,.30);\n}\n\n/* =========== base =========== */\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; background: var(--ink-1); color: var(--fg); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\nhtml { scroll-behavior: smooth; scroll-padding-top: 88px; }\nbody { overflow-x: hidden; min-height: 100svh; }\na { color: inherit; text-decoration: none; }\nbutton { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }\nimg, svg { display: block; max-width: 100%; }\n\n.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }\n@media (max-width: 640px) { .container { padding: 0 20px; } }\n\n.mono { font-family: var(--font-mono); font-feature-settings: \"ss01\",\"ss02\"; }\n.display { font-family: var(--font-display); font-weight: 300; letter-spacing: -.02em; }\n.eyebrow { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .18em; font-size: 11px; color: var(--fg-dim); font-weight: 500; }\n\n.badge-live {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 7px 14px 7px 10px;\n  font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase;\n  color: var(--fg-soft);\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line-2);\n  border-radius: var(--r-pill);\n  backdrop-filter: blur(10px);\n}\n.badge-live .dot {\n  width: 7px; height: 7px; border-radius: 50%; background: var(--live);\n  box-shadow: 0 0 0 0 rgba(34,197,94,.55);\n  animation: pulse 1.8s ease-in-out infinite;\n}\n@keyframes pulse {\n  0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.55); }\n  70%  { box-shadow: 0 0 0 8px rgba(34,197,94,0); }\n  100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }\n}\n\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 10px;\n  padding: 14px 22px;\n  border-radius: var(--r-pill);\n  font-weight: 500; font-size: 15px; letter-spacing: -.005em;\n  transition: transform .3s var(--ease), box-shadow .3s var(--ease), background .3s var(--ease);\n  position: relative; overflow: hidden;\n  white-space: nowrap;\n}\n.btn-primary {\n  color: var(--ink-0);\n  background: var(--grad-gold);\n  box-shadow: 0 1px 0 rgba(255,255,255,.25) inset, 0 10px 24px -10px rgba(212,175,55,.55);\n}\n.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 1px 0 rgba(255,255,255,.4) inset, 0 16px 30px -8px rgba(212,175,55,.65); }\n.btn-ghost {\n  color: var(--fg);\n  background: rgba(255,255,255,.03);\n  border: 1px solid var(--line-2);\n  backdrop-filter: blur(10px);\n}\n.btn-ghost:hover { background: rgba(255,255,255,.06); border-color: var(--line-gold); }\n.btn .arrow { transition: transform .3s var(--ease); }\n.btn:hover .arrow { transform: translateX(3px); }\n\n.gold-text {\n  background: var(--grad-gold);\n  -webkit-background-clip: text; background-clip: text;\n  -webkit-text-fill-color: transparent;\n}\n.mixed-text {\n  background: var(--grad-mixed);\n  -webkit-background-clip: text; background-clip: text;\n  -webkit-text-fill-color: transparent;\n}\n\n/* reveal */\n.reveal { opacity: 0; transform: translateY(20px); transition: opacity .9s var(--ease-out), transform .9s var(--ease-out); }\n.reveal.in { opacity: 1; transform: none; }\n.reveal.d-1 { transition-delay: .05s; }\n.reveal.d-2 { transition-delay: .1s; }\n.reveal.d-3 { transition-delay: .15s; }\n.reveal.d-4 { transition-delay: .2s; }\n.reveal.d-5 { transition-delay: .25s; }\n.reveal.d-6 { transition-delay: .3s; }\n\n/* =========== navbar =========== */\n.nav {\n  position: fixed; top: 0; left: 0; right: 0; z-index: 50;\n  transition: background .4s var(--ease), border-color .4s var(--ease), backdrop-filter .4s;\n  border-bottom: 1px solid transparent;\n}\n.nav.scrolled {\n  background: color-mix(in oklab, var(--ink-0) 72%, transparent);\n  backdrop-filter: saturate(160%) blur(18px);\n  -webkit-backdrop-filter: saturate(160%) blur(18px);\n  border-bottom-color: var(--line);\n}\n.nav-inner {\n  display: flex; align-items: center; justify-content: space-between;\n  height: 72px;\n}\n.logo {\n  display: inline-flex; align-items: center; gap: 10px;\n  font-family: var(--font-display); font-size: 20px; font-weight: 400; letter-spacing: -.01em;\n}\n.logo-img { height: 30px; width: auto; display: block; opacity: 1; filter: drop-shadow(0 0 1px rgba(255,255,255,.3)); }\n.logo-mark {\n  width: 28px; height: 28px; border-radius: 8px;\n  background: var(--grad-gold);\n  display: grid; place-items: center;\n  color: var(--ink-0); font-family: var(--font-mono); font-weight: 700; font-size: 14px;\n  box-shadow: 0 0 0 1px rgba(255,255,255,.1) inset, 0 4px 10px -4px rgba(212,175,55,.6);\n}\n.logo .dot-it { color: var(--gold-2); }\n.nav-links { display: flex; gap: 28px; align-items: center; }\n.nav-links a {\n  font-size: 14px; color: var(--fg-soft); transition: color .2s;\n}\n.nav-links a:hover { color: var(--fg); }\n.nav-right { display: flex; gap: 12px; align-items: center; }\n.lang-switch {\n  display: inline-flex; border: 1px solid var(--line-2); border-radius: var(--r-pill); overflow: hidden;\n  font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em;\n}\n.lang-switch button {\n  padding: 6px 10px; color: var(--fg-dim); transition: all .2s;\n}\n.lang-switch button.active { background: var(--fg); color: var(--ink-0); }\n@media (max-width: 760px) {\n  .nav-links { display: none; }\n}\n\n/* =========== hero =========== */\n.hero {\n  position: relative;\n  padding: 140px 0 120px;\n  min-height: 100svh;\n  display: flex; align-items: center;\n  overflow: hidden;\n}\n.hero-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; background: var(--grad-hero-bg); }\n.hero-grid-lines {\n  position: absolute; inset: 0; z-index: 0; pointer-events: none;\n  background-image:\n    linear-gradient(to right, var(--line) 1px, transparent 1px),\n    linear-gradient(to bottom, var(--line) 1px, transparent 1px);\n  background-size: 80px 80px;\n  mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 30%, transparent 80%);\n  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 30%, transparent 80%);\ ne-height: 1.45; }\n.pilot-list li::before {\n  content: \"\"; flex: 0 0 auto; width: 14px; height: 14px; margin-top: 3px;\n  border-radius: 50%;\n  background: var(--grad-gold);\n  box-shadow: 0 0 0 3px rgba(212,175,55,.08);\n}\n\n/* =========== faq =========== */\n.faq { padding: 120px 0; border-top: 1px solid var(--line); }\n.faq-grid { display: grid; grid-template-columns: 320px 1fr; gap: 80px; margin-top: 16px; }\n@media (max-width: 900px) { .faq-grid { grid-template-columns: 1fr; gap: 32px; } }\n.faq-item { border-bottom: 1px solid var(--line); }\n.faq-q {\n  width: 100%; text-align: left; padding: 26px 0;\n  display: flex; justify-content: space-between; align-items: center; gap: 24px;\n  font-family: var(--font-display); font-size: 20px; font-weight: 400; letter-spacing: -.01em; color: var(--fg);\n  transition: color .2s;\n}\n.faq-q:hover { color: var(--gold-1); }\n.faq-toggle {\n  flex: 0 0 auto; width: 28px; height: 28px; border-radius: 50%;\n  border: 1px solid var(--line-2);\n  display: grid; place-items: center;\n  transition: all .3s var(--ease);\n  color: var(--fg-soft);\n}\n.faq-item.open .faq-toggle { background: var(--grad-gold); color: var(--ink-0); border-color: transparent; transform: rotate(135deg); }\n.faq-a {\n  max-height: 0; overflow: hidden;\n  transition: max-height .5s var(--ease);\n}\n.faq-a-inner { padding: 0 0 28px; color: var(--fg-soft); font-size: 15.5px; line-height: 1.6; max-width: 640px; }\n.faq-item.open .faq-a { max-height: 400px; }\n\n/* =========== booking =========== */\n.booking {\n  padding: 120px 0 140px;\n  border-top: 1px solid var(--line);\n  position: relative;\n  overflow: hidden;\n}\n.booking::before {\n  content: \"\"; position: absolute; inset: 0;\n  background: radial-gradient(ellipse 80% 60% at 80% 20%, rgba(30,58,138,.28), transparent 60%),\n              radial-gradient(ellipse 60% 50% at 10% 80%, rgba(212,175,55,.1), transparent 60%);\n  pointer-events: none;\n}\n.booking-inner { position: relative; display: grid; grid-template-columns: 1fr 1.1fr; gap: 80px; align-items: start; }\n@media (max-width: 900px) { .booking-inner { grid-template-columns: 1fr; gap: 48px; } }\n.booking-form {\n  background: color-mix(in oklab, var(--ink-2) 84%, transparent);\n  backdrop-filter: blur(14px);\n  border: 1px solid var(--line-2); border-radius: var(--r-xl);\n  padding: 36px;\n  box-shadow: 0 60px 120px -40px rgba(0,0,0,.6);\n}\n.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }\n.form-row.full { grid-template-columns: 1fr; }\n.field label { display: block; font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: .14em; margin-bottom: 8px; }\n.field input, .field textarea {\n  width: 100%; padding: 13px 14px;\n  background: rgba(255,255,255,.02);\n  border: 1px solid var(--line-2); border-radius: var(--r-md);\n  color: var(--fg); font: inherit; font-size: 15px;\n  transition: border-color .2s, background .2s;\n}\n.field input:focus, .field textarea:focus { outline: none; border-color: var(--gold-2); background: rgba(255,255,255,.04); }\n.field textarea { resize: vertical; min-height: 84px; font-family: var(--font-sans); }\n.form-submit { width: 100%; margin-top: 10px; padding: 16px; font-size: 15px; }\n.form-small { margin-top: 14px; font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-dim); letter-spacing: .08em; text-align: center; }\n.form-status { min-height: 24px; text-align: center; font-family: var(--font-mono); font-size: 12px; color: var(--live); margin-top: 10px; }\n\n/* =========== footer =========== */\n.footer { padding: 60px 0 40px; border-top: 1px solid var(--line); text-align: center; }\n.footer .logo { justify-content: center; margin-bottom: 14px; }\n.footer p { color: var(--fg-dim); font-size: 13px; margin: 6px 0; }\n.footer-links { display: flex; justify-content: center; gap: 18px; margin-top: 18px; flex-wrap: wrap; font-size: 12.5px; color: var(--fg-dim); }\n.footer-links a:hover { color: var(--fg); }\n\n/* =========== tweaks panel =========== */\n.tweaks {\n  position: fixed; right: 20px; bottom: 20px; z-index: 100;\n  display: none;\n  width: 280px;\n  background: color-mix(in oklab, var(--ink-3) 92%, transparent);\n  backdrop-filter: blur(20px);\n  border: 1px solid var(--line-2);\n  border-radius: var(--r-lg);\n  padding: 18px;\n  box-shadow: 0 40px 80px -20px rgba(0,0,0,.6);\n  font-size: 13px;\n}\n.tweaks.on { display: block; }\n.tweaks h6 { margin: 0 0 12px; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .2em; text-transform: uppercase; color: var(--fg-dim); display: flex; justify-content: space-between; align-items: center; }\n.tweak-group { margin-bottom: 14px; }\n.tweak-group-label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: .14em; margin-bottom: 6px; }\n.tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }\n.tweak-opt {\n  padding: 5px 10px; font-size: 11.5px;\n  border: 1px solid var(--line-2); border-radius: var(--r-pill);\n  color: var(--fg-soft); background: transparent; cursor: pointer; transition: all .2s;\n}\n.tweak-opt:hover { border-color: var(--line-gold); }\n.tweak-opt.active { background: var(--fg); color: var(--ink-0); border-color: transparent; }\n.tweak-swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }\n.tweaks-close {\n  background: none; border: 0; color: var(--fg-dim); cursor: pointer; font-size: 14px;\n}\n\n/* accessibility focus */\n:focus-visible { outline: 2px solid var(--gold-2); outline-offset: 3px; border-radius: 4px; }\n\n/* floating mic (persistent after scroll) */\n.float-mic {\n  position: fixed; right: 20px; bottom: 20px; z-index: 60;\n  width: 64px; height: 64px; border-radius: 50%;\n  background: var(--grad-gold);\n  display: grid; place-items: center; cursor: pointer;\n  color: var(--ink-0); font-size: 22px;\n  box-shadow: 0 20px 40px -10px rgba(212,175,55,.5);\n  opacity: 0; transform: translateY(10px) scale(.9);\n  transition: all .4s var(--ease);\n  pointer-events: none;\n}\n.float-mic.on { opacity: 1; transform: none; pointer-events: auto; }\n.float-mic:hover { transform: scale(1.05); }\n.float-mic::after {\n  content: \"\"; position: absolute; inset: -2px; border-radius: 50%;\n  border: 2px solid var(--gold-2); opacity: .5;\n  animation: mic-ring 2s ease-out infinite;\n}\n\n/* scroll hint */\n.scroll-hint {\n  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);\n  font-family: var(--font-mono); font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--fg-dim);\n  display: flex; flex-direction: column; align-items: center; gap: 8px;\n  z-index: 1;\n}\n.scroll-hint .line {\n  width: 1px; height: 36px; background: linear-gradient(to bottom, transparent, var(--gold-2));\n  animation: scroll-move 2s ease-in-out infinite;\n}\n@keyframes scroll-move {\n  0% { transform: scaleY(0); transform-origin: top; }\n  50% { transform: scaleY(1); transform-origin: top; }\n  51% { transform: scaleY(1); transform-origin: bottom; }\n  100% { transform: scaleY(0); transform-origin: bottom; }\n}\n\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- =================== NAV =================== -->\n<nav class=\"nav\" id=\"nav\" aria-label=\"Primary\">\n  <div class=\"container nav-inner\">\n    <a href=\"#hero\" class=\"logo\" aria-label=\"Telesales home\">\n      <img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABHAAAAEVCAYAAACIdxKUAAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAEcKADAAQAAAABAAABFQAAAABPpK0vAABAAElEQVR4Aey9CbxFR1XmmwCBhBAyDwQiIDYgDQIiIihgQ6vghLQyPhoQ8THoQwaBbgV8DPJAHoit0g6AAwixlX6PucVGQEBB5CGChDkNMfMchjAk5H3/uufbqbvvGfaZ9znnW7/fujVXrfpqVe2qdWrve8ghoSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBA n      <div class=\"marco-pills\">\n        <span class=\"pill-pill\"><span class=\"d\"><\u002Fspan><span data-i18n=\"marco.p1\">Online<\u002Fspan><\u002Fspan>\n        <span class=\"pill-pill\">🇮🇹 <span data-i18n=\"marco.p2\">Italiano nativo<\u002Fspan><\u002Fspan>\n        <span class=\"pill-pill\">🔊 <span data-i18n=\"marco.p3\">Voce reale<\u002Fspan><\u002Fspan>\n        <span class=\"pill-pill\">⚡ &lt;800ms<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"marco-cta\">\n        <button class=\"btn btn-primary\" id=\"marcoCallBtn\" data-call-marco=\"\">\n          <span id=\"marcoBtnIcon\">🎙<\u002Fspan>\n          <span id=\"marcoBtnLabel\" data-i18n=\"marco.start\">Clicca per parlare con Marco<\u002Fspan>\n        <\u002Fbutton>\n        <a href=\"#\" class=\"btn btn-ghost\" id=\"openTab\" data-i18n=\"marco.tab\">Apri in nuova scheda ↗<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"marco-state\" id=\"marcoState\" aria-live=\"polite\">\n        <span class=\"st\" data-i18n=\"marco.idle\">● pronto<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"marco-wave\" id=\"marcoWave\" aria-hidden=\"true\"><\u002Fdiv>\n      <div class=\"marco-transcript\" id=\"marcoTranscript\" aria-live=\"polite\">\n        <div class=\"who\">Marco<\u002Fdiv>\n        <div class=\"txt\" id=\"marcoTxt\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"text-align:left; max-width:720px; margin: 48px auto 12px;\">\n      <div class=\"eyebrow\" data-i18n=\"marco.try\">— Prova a chiedergli<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"marco-try\">\n      <button class=\"q\" data-say=\"Quanto costa e come funziona il pricing?\"><span>Quanto costa davvero?<\u002Fspan><span>↗<\u002Fspan><\u002Fbutton>\n      <button class=\"q\" data-say=\"Come si integra con il mio CRM esistente?\"><span>Si integra col mio CRM?<\u002Fspan><span>↗<\u002Fspan><\u002Fbutton>\n      <button class=\"q\" data-say=\"I miei clienti si accorgeranno che è un'AI?\"><span>Si accorgono che è un'AI?<\u002Fspan><span>↗<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =================== PROCESS =================== -->\n<section class=\"process\" id=\"process\">\n  <div class=\"container\">\n    <div class=\"section-eyebrow\"><span class=\"eyebrow\">— Come funziona<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\"><span data-i18n=\"proc.title1\">Dalla call al risultato<\u002Fspan> <em data-i18n=\"proc.title2\">in 48 ore.<\u002Fem><\u002Fh2>\n    <p class=\"section-sub\" data-i18n=\"proc.sub\">Nessuna offerta da 40 pagine. Nessun contratto vincolante prima di vedere i numeri.<\u002Fp>\n\n    <div class=\"process-grid\">\n      <div class=\"step reveal d-1\">\n        <div class=\"n\">01<\u002Fdiv>\n        <h4 data-i18n=\"proc.s1.t\">Discovery di 15 minuti<\u002Fh4>\n        <p data-i18n=\"proc.s1.d\">Ti facciamo domande su cosa vendi, a chi, e dove si inceppa il processo. Zero vendita.<\u002Fp>\n        <div class=\"dur\" data-i18n=\"proc.s1.dur\">15 min · gratis<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step reveal d-2\">\n        <div class=\"n\">02<\u002Fdiv>\n        <h4 data-i18n=\"proc.s2.t\">Pilot su misura · 48h<\u002Fh4>\n        <p data-i18n=\"proc.s2.d\">Costruiamo Marco addestrato sul tuo prodotto. Chiama 200 contatti veri. Vedi i risultati in dashboard.<\u002Fp>\n        <div class=\"dur\" data-i18n=\"proc.s2.dur\">dati reali · no mockup<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step reveal d-3\">\n        <div class=\"n\">03<\u002Fdiv>\n        <h4 data-i18n=\"proc.s3.t\">Scali solo se funziona<\u002Fh4>\n        <p data-i18n=\"proc.s3.d\">Il pilot deve portare lead misurabili. Se non li porta, non paghi lo scale-up. Fine.<\u002Fp>\n        <div class=\"dur\" data-i18n=\"proc.s3.dur\">performance based<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pilot-include reveal\">\n      <div>\n        <h5 data-i18n=\"proc.inc.t\">Cosa include ogni pilot<\u002Fh5>\n        <p class=\"small\" data-i18n=\"proc.inc.s\">Incluso nel pilot 48h — senza costi aggiuntivi.<\u002Fp>\n      <\u002Fdiv>\n      <ul class=\"pilot-list\">\n        <li data-i18n=\"proc.inc.1\">Training su tuoi prodotti e obiezioni<\u002Fli>\n        <li data-i18n=\"proc.inc.2\">Integrazione con CRM esistente<\u002Fli>\n        <li data-i18n=\"proc.inc.3\">Compliance GDPR + registro consensi<\u002Fli>\n        <li data-i18n=\"proc.inc.4\">Handoff umano su lead caldi<\u002Fli>\n        <li data-i18n=\"proc.inc.5\">Registrazione e trascrizione call<\u002Fli>\n        <li data-i18n=\"proc.inc.6\">Dashboard real-time con sentiment<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =================== FAQ =================== -->\n<section class=\"faq\" id=\"faq\">\n  <div class=\"container\">\n    <div class=\"faq-grid\">\n      <div>\n        <div class=\"section-eyebrow\"><span class=\"eyebrow\">— FAQ<\u002Fspan><\u002Fdiv>\n        <h2 class=\"section-title\" style=\"font-size: clamp(32px, 4vw, 48px);\"><span data-i18n=\"faq.title1\">Le domande<\u002Fspan><br><em data-i18n=\"faq.title2\">che ci fanno davvero.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <div id=\"faqList\">\n        <!-- filled by JS -->\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =================== BOOKING =================== -->\n<section class=\"booking\" id=\"booking\">\n  <div class=\"container booking-inner\">\n    <div>\n      <div class=\"section-eyebrow\"><span class=\"eyebrow\">— 15 minuti con Niccolò<\u002Fspan><\u002Fdiv>\n      <h2 class=\"section-title\"><span data-i18n=\"book.title1\">Demo su misura.<\u002Fspan><br><em data-i18n=\"book.title2\">Zero vendita.<\u002Fem><\u002Fh2>\n      <p class=\"section-sub\" data-i18n=\"book.sub\">\n        Ti mostriamo Marco dal vivo che chiama un tuo prospect (o uno che scegli tu). Se ti convinci, parliamo di pilot. Se no, ci salutiamo. Punto.\n      <\u002Fp>\n      <div style=\"margin-top:36px; display:grid; gap:14px;\">\n        <div style=\"display:flex; gap:14px; align-items:center;\">\n          <div style=\"width:44px;height:44px;border-radius:50%;background:var(--grad-gold);display:grid;place-items:center;color:var(--ink-0);font-family:var(--font-display);font-size:18px;\">N<\u002Fdiv>\n          <div>\n            <div style=\"font-family:var(--font-display);font-size:18px;\">Niccolò Pratesi<\u002Fdiv>\n            <div class=\"eyebrow\">CEO &amp; co-founder<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"color:var(--fg-dim); font-size:13.5px; line-height:1.55; margin:0;\" data-i18n=\"book.niccolo\">\n          \"Rispondo io alle call. Se non ti è utile, lo dico dopo 5 minuti e ti lascio andare.\"\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <form class=\"booking-form\" id=\"bookingForm\">\n      <div class=\"form-row\">\n        <div class=\"field\">\n          <label for=\"nome\" data-i18n=\"book.f1\">Nome<\u002Flabel>\n          <input id=\"nome\" name=\"nome\" required=\"\" autocomplete=\"given-name\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label for=\"cognome\" data-i18n=\"book.f2\">Cognome<\u002Flabel>\n          <input id=\"cognome\" name=\"cognome\" required=\"\" autocomplete=\"family-name\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-row full\">\n        <div class=\"field\">\n          <label for=\"email\">Email<\u002Flabel>\n          <input id=\"email\" type=\"email\" name=\"email\" required=\"\" autocomplete=\"email\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-row full\">\n        <div class=\"field\">\n          <label for=\"tel\" data-i18n=\"book.f4\">Cellulare<\u002Flabel>\n          <input id=\"tel\" type=\"tel\" name=\"tel\" required=\"\" autocomplete=\"tel\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-row full\">\n        <div class=\"field\">\n          <label for=\"az\" data-i18n=\"book.f5\">Azienda<\u002Flabel>\n          <input id=\"az\" name=\"az\" required=\"\" autocomplete=\"organization\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-row full\">\n        <div class=\"field\">\n          <label for=\"msg\" data-i18n=\"book.f6\">Messaggio (opzionale)<\u002Flabel>\n          <textarea id=\"msg\" name=\"msg\" rows=\"3\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button type=\"submit\" class=\"btn btn-primary form-submit\" id=\"submitBtn\">\n        <span data-i18n=\"book.submit\">Prenota demo<\u002Fspan> <span class=\"arrow\">→<\u002Fspan>\n      <\u002Fbutton>\n      <div class=\"form-status\" id=\"formStatus\"><\u002Fdiv>\n      <p class=\"form-small\" data-i18n=\"book.small\">DATI AL SICURO · GDPR · MAI VENDUTI A TERZI<\u002Fp>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =================== FOOTER =================== -->\n<footer class=\"footer\">\n  <div class=\"container\">\n    <a href=\"#hero\" class=\"logo\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABHAAAAEVCAYAAACIdxKUAAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAEcKADAAQAAAABAAABFQAAAABPpK0vAABAAElEQVR4Aey9CbxFR1XmmwCBhBAyDwQiIDYgDQIiIihgQ6vghLQyPhoQ8THoQwaBbgV8DPJAHoit0g6AAwixlX6PucVGQEBB5CGChDkNMfMchjAk5H3/uufbqbvvGfaZ9znnW7/fujVXrfpqVe2qdWrve8ghoSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEASCQBAIAkEgCASBIBAEgkAQCAJBIAgEgSAQBIJAEAgCQSAIBIEgEA ano nativo con cadenza toscana, pause naturali, gestisce interruzioni. Abbiamo registrazioni che puoi ascoltare in blind test. Spoiler: non indovini.\" },\n    { q: \"Si integra con il mio CRM?\", a: \"Sì. HubSpot, Salesforce, Pipedrive, Zoho, Freshsales, e custom via API. Ogni call scrive automaticamente contatto, trascrizione, sentiment, next action.\" },\n    { q: \"E la privacy / GDPR?\", a: \"Registro consensi integrato. Le chiamate informano il prospect all'inizio (\\\"sto usando un assistente AI…\\\"). Server UE. Nessun dato fuori dall'EEA. DPA firmabile prima del pilot.\" },\n    { q: \"Cosa succede se Marco sbaglia?\", a: \"Handoff umano automatico su trigger configurabili (richiesta esplicita, sentiment negativo, argomento fuori scope). Tutte le call sono registrate e riascoltabili. Ogni errore diventa training per la versione successiva.\" },\n    { q: \"Posso provarlo prima di pagare?\", a: \"Sì, la demo è gratis (15 min). Il pilot 48h è a pagamento perché lo costruiamo su misura, ma se non porta lead misurabili lo rifondiamo al 100%. Senza storie.\" },\n    { q: \"Quanto ci mette a partire?\", a: \"Da contratto firmato a prima chiamata reale: 48 ore. Niente onboarding da 3 mesi, niente consulenti, niente Gantt di 40 righe.\" }\n  ],\n  en: [\n    { q: \"Does it actually work? Sounds too good.\", a: \"We made 1,033 real calls in 5 days on our target companies. You can listen to the recordings during discovery. We don't ask you to trust us — we ask you to verify.\" },\n    { q: \"How much does it cost?\", a: \"48h pilot: €2,900 one-off. Scale-up: from €1,500/month based on call volume. No hidden setup, no yearly minimums. If the pilot doesn't land measurable leads, the scale-up doesn't start.\" },\n    { q: \"Will my clients notice it's AI?\", a: \"No. Marco speaks native Italian with Tuscan cadence, natural pauses, handles interruptions. We have blind-test recordings. Spoiler: you can't guess.\" },\n    { q: \"Does it integrate with my CRM?\", a: \"Yes. HubSpot, Salesforce, Pipedrive, Zoho, Freshsales, plus custom via API. Each call writes contact, transcript, sentiment, next action automatically.\" },\n    { q: \"What about privacy / GDPR?\", a: \"Built-in consent log. Calls disclose at the start (\\\"I'm using an AI assistant…\\\"). EU servers. No data outside the EEA. DPA signable before the pilot.\" },\n    { q: \"What if Marco makes mistakes?\", a: \"Automatic human handoff on configurable triggers (explicit request, negative sentiment, out-of-scope topic). All calls recorded and replayable. Every error becomes training for the next version.\" },\n    { q: \"Can I try before paying?\", a: \"Yes — the demo is free (15 min). The 48h pilot is paid because we build it custom for you, but if it doesn't bring measurable leads we refund 100%. No games.\" },\n    { q: \"How fast until go-live?\", a: \"From signed contract to first real call: 48 hours. No 3-month onboarding, no consultants, no 40-row Gantt chart.\" }\n  ]\n};\n\nwindow.MARCO_SCRIPT = {\n  default: {\n    it: [\n      \"Ciao! Sono Marco, l'AI commerciale di Telesales.\",\n      \"Posso raccontarti dei nostri 9 prodotti, farti vedere i numeri di questa settimana, o risponderti qualunque cosa.\",\n      \"Su cosa vuoi che ti spieghi per primo?\"\n    ],\n    en: [\n      \"Hi! I'm Marco, the AI salesperson for Telesales.\",\n      \"I can walk you through our 9 products, show you this week's numbers, or answer anything.\",\n      \"What do you want me to explain first?\"\n    ]\n  },\n  pricing: {\n    it: [\n      \"Ottima domanda sul prezzo.\",\n      \"Pilot 48 ore: duemila-novecento euro una tantum. Dentro c'è tutto: training, integrazione CRM, 200 chiamate reali.\",\n      \"Lo scale-up parte da millecinquecento al mese. Se il pilot non porta lead misurabili, lo scale-up non parte. Fine.\"\n    ],\n    en: [\n      \"Great question on pricing.\",\n      \"48h pilot: two-thousand-nine-hundred euros one-off. Everything's included: training, CRM integration, 200 real calls.\",\n      \"Scale-up starts at fifteen hundred a month. If the pilot doesn't bring measurable leads, scale-up doesn't start. Period.\"\n    ]\n  },\n  crm: {\n    it: [\n      \"Sì, mi integro con il tuo CRM.\",\n      \"HubSpot, Salesforce, Pipedrive, Zoho. Ogni chiamata che faccio scrive automaticamente contatto, trascrizione, sentiment e next action.\",\n      \"Tu apri il CRM la mattina e trovi tutto pronto.\"\n    ],\n    en: [\n      \"Yes, I integrate with your CRM.\",\n      \"HubSpot, Salesforce, Pipedrive, Zoho. Every call I make writes contact, transcript, sentiment and next action automatically.\",\n      \"You open the CRM in the morning and find everything ready.\"\n    ]\n  },\n  human: {\n    it: [\n      \"Domanda onesta. Rispondo onestamente.\",\n      \"I tuoi clienti non si accorgono. Parlo italiano nativo, gestisco interruzioni, faccio pause reali. Abbiamo blind test: nessuno indovina.\",\n      \"All'inizio della chiamata dico comunque che sono un assistente AI — è legge. Ma la conversazione poi fluisce come con un umano.\"\n    ],\n    en: [\n      \"Honest question. Honest answer.\",\n      \"Your clients won't notice. I speak native Italian, handle interruptions, use real pauses. We have blind tests — nobody guesses.\",\n      \"At the start I still disclose I'm an AI assistant — it's the law. But the conversation flows like with a human.\"\n    ]\n  }\n};\n\n<\u002Fscript>\n<script>\n/* Telesales landing — interactions */\n(() => {\n  const $ = (s, r = document) => r.querySelector(s);\n  const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));\n\n  /* =========== i18n =========== */\n  let currentLang = localStorage.getItem('ts.lang') || 'it';\n  function applyI18n(lang) {\n    currentLang = lang;\n    document.documentElement.lang = lang;\n    const dict = window.I18N[lang];\n    $$('[data-i18n]').forEach(el => {\n      const k = el.getAttribute('data-i18n');\n      if (dict[k] != null) el.innerHTML = dict[k];\n    });\n    // hero variant (reapply with current copy variant)\n    applyHeroVariant(state.hero);\n    // FAQ rebuild\n    buildFaq();\n    localStorage.setItem('ts.lang', lang);\n    $$('.lang-switch button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));\n  }\n\n  /* =========== state + tweaks =========== */\n  const stored = (() => { try { return JSON.parse(localStorage.getItem('ts.tweaks') || 'null'); } catch(e) { return null; } })();\n  const state = Object.assign({}, window.TWEAK_DEFAULTS, stored || {});\n  function persist() { try { localStorage.setItem('ts.tweaks', JSON.stringify(state)); } catch(e) {} }\n\n  function applyAccent(v) {\n    state.accent = v;\n    document.documentElement.setAttribute('data-accent', v === 'gold' ? 'gold' : v);\n    if (v === 'gold') document.documentElement.removeAttribute('data-accent');\n    persist();\n  }\n  function applyTheme(v) {\n    state.theme = v;\n    if (v === 'light') document.documentElement.setAttribute('data-theme','light');\n    else document.documentElement.setAttribute('data-theme','dark');\n    persist();\n  }\n  function applyHeroVariant(v) {\n    state.hero = v;\n    const pack = (window.HERO_VARIANTS[currentLang] || window.HERO_VARIANTS.it)[v];\n    if (!pack) return;\n    // direct DOM writes into the headline spans\n    const lines = $('.hero-headline [data-i18n]');\n    if (lines[0]) lines[0].textContent = pack.h1a;\n    if (lines[1]) lines[1].textContent = pack.h1b;\n    if (lines[2]) lines[2].textContent = pack.h1c;\n    if (lines[3]) lines[3].textContent = pack.h1d;\n    const sub = $('.hero-sub'); if (sub) sub.textContent = pack.sub;\n    persist();\n  }\n\n  // tweaks panel\n  $$('.tweak-options').forEach(group => {\n    const key = group.dataset.tweak;\n    group.addEventListener('click', (e) => {\n      const btn = e.target.closest('.tweak-opt'); if (!btn) return;\n      const v = btn.dataset.val;\n      group.querySelectorAll('.tweak-opt').forEach(b => b.classList.toggle('active', b === btn));\n      if (key === 'accent') applyAccent(v);\n      if (key === 'theme') applyTheme(v);\n      if (key === 'hero') applyHeroVariant(v);\n      // notify host\n      try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]: v}}, '*'); } catch(e) {}\n    });\n  });\n  // mark current tweak buttons active\n  function syncTweakButtons() {\n    $$('.tweak-options').forEach(group => {\n      const key = group.dataset.tweak;\n      group.querySelectorAll('.tweak-opt').forEach(b => b.classList.toggle('active', b.dataset.val === state[key]));\n    });\n  }\n\n  // edit mode host protocol\n  window.addEventListener('message', (ev) => {\n    if (!ev.data || !ev.data.type) return;\n    if (ev.data.type === '__activate_edit_mode') $('#tweaks').classList.add('on');\n    if (ev.data.type === '__deactivate_edit_mode') $('#tweaks').classList.remove('on');\n  });\n  $('#tweaksClose').addEventListener('click', () => {\n    $('#tweaks').classList.remove('on');\n    try { window.parent.postMessage({type:'__deactivate_edit_mode'}, '*'); } catch(e) {}\n  });\n  requestAnimationFrame(() => {\n    try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e) {}\n  });\n\n  // lang buttons\n  $$('.lang-switch button').forEach(b => {\n    b.addEventListener('click', () => applyI18n(b.dataset.lang));\n  });\n\n  /* =========== nav scroll =========== */\n  const nav = $('#nav');\n  const floatMic = $('#floatMic');\n  function onScroll() {\n    const y = window.scrollY;\n    nav.classList.toggle('scrolled', y > 20);\n    floatMic.classList.toggle('on', y > 600);\n  }\n  window.addEventListener('scroll', onScroll, { passive: true });\n  onScroll();\n\n  /* =========== reveal on view =========== */\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });\n  }, { threshold: .12, rootMargin: '0px 0px -40px 0px' });\n  $$('.reveal').forEach(el => io.observe(el));\n\n  /* =========== count-up =========== */\n  const cio = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (!e.isIntersecting) return;\n      const el = e.target;\n      const target = parseInt(el.dataset.count, 10);\n      const suffix = el.dataset.suffix || '';\n      const dur = 1400;\n      const t0 = performance.now();\n      const fmt = (n) => n.toLocaleString(currentLang === 'it' ? 'it-IT' : 'en-US');\n      function step(t) {\n        const p = Math.min(1, (t - t0) / dur);\n        const eased = 1 - Math.pow(1 - p, 3);\n        el.textContent = fmt(Math.round(target * eased)) + suffix;\n        if (p < 1) requestAnimationFrame(step);\n      }\n      requestAnimationFrame(step);\n      cio.unobserve(el);\n    });\n  }, { threshold: .4 });\n  $$('[data-count]').forEach(el => cio.observe(el));\n\n  /* =========== marquee (duplicate content for seamless loop) =========== */\n  const track = $('#marqueeTrack');\n  const names = window.COMPANIES;\n  const pills = names.map(n => `<span class=\"pill-company\">${n}<\u002Fspan>`).join('');\n  track.innerHTML = pills + pills;\n\n  /* =========== hero waveform (persistent, procedural) =========== */\n  const heroWave = $('#heroWave');\n  const BAR_COUNT = 56;\n  for (let i = 0; i < BAR_COUNT; i++) {\n    const b = document.createElement('span');\n    b.className = 'bar';\n    heroWave.appendChild(b);\n  }\n  const heroBars = heroWave.querySelectorAll('.bar');\n  let t0 = performance.now();\n  function tickHero() {\n    const t = (performance.now() - t0) / 1000;\n    heroBars.forEach((b, i) => {\n      const x = i / BAR_COUNT;\n      // multi-band envelope\n      const env =\n        0.35 + 0.35 * Math.sin(x * 5 + t * 2.1) * Math.cos(t * 1.1) +\n        0.20 * Math.sin(x * 17 + t * 4) +\n        0.15 * Math.sin(t * 3 + x * 23);\n      const h = Math.max(3, Math.min(1, Math.abs(env)) * 100);\n      b.style.height = h + '%';\n      b.style.opacity = 0.6 + 0.4 * Math.sin(x * 8 + t);\n    });\n    requestAnimationFrame(tickHero);\n  }\n  tickHero();\n\n  // product hero (AI Voice card) mini wave\n  const pw = $('#productWave');\n  for (let i = 0; i < 28; i++) { const b = document.createElement('span'); pw.appendChild(b); }\n  const pwBars = pw.querySelectorAll('span');\n  function tickPW() {\n    const t = performance.now() / 1000;\n    pwBars.forEach((b, i) => {\n      const x = i / 28;\n      const h = Math.abs(Math.sin(x * 9 + t * 2.3) * 0.6 + Math.sin(t * 4 + x * 15) * 0.3) * 40 + 4;\n      b.style.height = h + 'px';\n    });\n    requestAnimationFrame(tickPW);\n  }\n  tickPW();\n\n  // hero visual timer\n  let tvt = 134;\n  setInterval(() => {\n    tvt++;\n    const m = String(Math.floor(tvt / 60)).padStart(2,'0');\n    const s = String(tvt % 60).padStart(2,'0');\n    const el = $('#hv-timer'); if (el) el.textContent = '00:' + m + ':' + s;\n  }, 1000);\n\n  /* =========== FAQ =========== */\n  function buildFaq() {\n    const list = $('#faqList');\n    const data = window.FAQ[currentLang] || window.FAQ.it;\n    list.innerHTML = data.map((f, i) => `\n      <div class=\"faq-item\" data-idx=\"${i}\">\n        <button class=\"faq-q\" aria-expanded=\"false\">\n          <span>${f.q}<\u002Fspan>\n          <span class=\"faq-toggle\" aria-hidden=\"true\">+<\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">${f.a}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    `).join('');\n    list.querySelectorAll('.faq-item').forEach(item => {\n      item.querySelector('.faq-q').addEventListener('click', () => {\n        const wasOpen = item.classList.contains('open');\n        list.querySelectorAll('.faq-item').forEach(x => x.classList.remove('open'));\n        if (!wasOpen) item.classList.add('open');\n      });\n    });\n  }\n\n  /* =========== Marco call simulation =========== */\n  const micOrb = $('#micOrb');\n  const marcoWave = $('#marcoWave');\n  const marcoState = $('#marcoState');\n  const marcoTranscript = $('#marcoTranscript');\n  const marcoTxt = $('#marcoTxt');\n  const marcoBtnLabel = $('#marcoBtnLabel');\n  const marcoBtnIcon = $('#marcoBtnIcon');\n\n  // build marco wave bars\n  for (let i = 0; i < 48; i++) { const b = document.createElement('span'); b.className = 'bar'; marcoWave.appendChild(b); }\n  const mwBars = marcoWave.querySelectorAll('.bar');\n  let mwActive = false;\n  function tickMW() {\n    const t = performance.now() / 1000;\n    mwBars.forEach((b, i) => {\n      const x = i / 48;\n      const amp = mwActive ? (0.5 + 0.5 * Math.sin(t * 3 + x * 2)) : 0.15;\n      const h = (Math.abs(Math.sin(x * 13 + t * 6)) * 0.6 + Math.sin(t * 8 + x * 19) * 0.3) * 60 * amp + 4;\n      b.style.height = h + 'px';\n    });\n    requestAnimationFrame(tickMW);\n  }\n  tickMW();\n\n  let callState = 'idle'; // idle | connecting | live | ending | ended\n  let typingTimer = null;\n\n  function setState(next) {\n    callState = next;\n    const key = 'marco.' + (next === 'idle' ? 'idle' : next === 'connecting' ? 'connecting' : next === 'live' ? 'live' : 'ended');\n    const txt = window.I18N[currentLang][key] || '';\n    marcoState.innerHTML = `<span class=\"st ${next === 'live' ? 'live' : next === 'ended' ? 'end' : ''}\">${txt}<\u002Fspan>`;\n\n    if (next === 'idle') {\n      marcoWave.classList.remove('on'); marcoTranscript.classList.remove('on');\n      marcoTxt.textContent = ''; mwActive = false;\n      marcoBtnIcon.textContent = '🎙';\n      marcoBtnLabel.textContent = window.I18N[currentLang]['marco.start'];\n    }\n    if (next === 'connecting') {\n      marcoWave.classList.add('on'); marcoTranscript.classList.remove('on');\n      mwActive = false;\n      marcoBtnIcon.textContent = '⏸';\n      marcoBtnLabel.textContent = currentLang === 'it' ? 'Chiudi' : 'End';\n    }\n    if (next === 'live') {\n      marcoWave.classList.add('on'); marcoTranscript.classList.add('on');\n      mwActive = true;\n      marcoBtnIcon.textContent = '⏸';\n      marcoBtnLabel.textContent = currentLang === 'it' ? 'Chiudi chiamata' : 'End call';\n    }\n    if (next === 'ended') {\n      marcoWave.classList.remove('on');\n      mwActive = false;\n      marcoBtnIcon.textContent = '🎙';\n      marcoBtnLabel.textContent = currentLang === 'it' ? 'Richiama' : 'Call again';\n    }\n  }\n\n  function typeLines(lines, done) {\n    if (typingTimer) clearTimeout(typingTimer);\n    let full = '';\n    let li = 0, ci = 0;\n    marcoTxt.innerHTML = '';\n    function tick() {\n      if (callState !== 'live') return;\n      if (li >= lines.length) { done && done(); return; }\n      const line = lines[li];\n      if (ci < line.length) {\n        full = full + line[ci];\n        marcoTxt.innerHTML = full + '<span class=\"caret\"><\u002Fspan>';\n        ci++;\n        typingTimer = setTimeout(tick, 22 + Math.random() * 30);\n      } else {\n        full = full + '\\n\\n';\n        marcoTxt.innerHTML = full + '<span class=\"caret\"><\u002Fspan>';\n        ci = 0; li++;\n        typingTimer = setTimeout(tick, 450);\n      }\n    }\n    tick();\n  }\n\n  function startCall(scriptKey) {\n    if (callState === 'connecting' || callState === 'live') {\n      endCall(); return;\n    }\n    setState('connecting');\n    const key = scriptKey || 'default';\n    setTimeout(() => {\n      if (callState !== 'connecting') return;\n      setState('live');\n      const script = (window.MARCO_SCRIPT[key] || window.MARCO_SCRIPT.default)[currentLang] || window.MARCO_SCRIPT.default.it;\n      typeLines(script, () => {\n        setTimeout(() => { if (callState === 'live') endCall(); }, 1600);\n      });\n    }, 1400);\n  }\n\n  function endCall() {\n    if (typingTimer) clearTimeout(typingTimer);\n    setState('ended');\n    setTimeout(() => { if (callState === 'ended') setState('idle'); }, 2800);\n  }\n\n  // bind all call triggers\n  $$('[data-call-marco]').forEach(btn => {\n    btn.addEventListener('click', (e) => {\n      e.preventDefault();\n      // scroll to marco if not in view\n      const marco = $('#marco');\n      const rect = marco.getBoundingClientRect();\n      if (rect.top < -100 || rect.top > window.innerHeight * .6) {\n        marco.scrollIntoView ? null : null;\n        window.scrollTo({ top: marco.offsetTop - 60, behavior: 'smooth' });\n      }\n      startCall();\n    });\n  });\n\n  // try-question buttons\n  $$('.marco-try .q').forEach(btn => {\n    btn.addEventListener('click', () => {\n      const say = btn.getAttribute('data-say') || '';\n      const key = /costa|prezzo|pricing|cost/i.test(say) ? 'pricing'\n                : /crm|integra/i.test(say) ? 'crm'\n                : /accor|umano|human|notice/i.test(say) ? 'human'\n                : 'default';\n      startCall(key);\n    });\n  });\n\n  /* =========== booking form =========== */\n  const form = $('#bookingForm');\n  const status = $('#formStatus');\n  const submit = $('#submitBtn');\n  form.addEventListener('submit', (e) => {\n    e.preventDefault();\n    submit.disabled = true;\n    const origLabel = submit.innerHTML;\n    submit.innerHTML = `<span class=\"mono\">${currentLang === 'it' ? 'invio…' : 'sending…'}<\u002Fspan>`;\n    setTimeout(() => {\n      submit.innerHTML = `✓ ${currentLang === 'it' ? 'prenotato' : 'booked'}`;\n      status.textContent = currentLang === 'it'\n        ? 'Ti ricontattiamo entro 24h · controlla la mail.'\n        : 'We\\'ll get back within 24h · check your inbox.';\n      setTimeout(() => {\n        submit.disabled = false;\n        submit.innerHTML = origLabel;\n        status.textContent = '';\n        form.reset();\n      }, 4000);\n    }, 1200);\n  });\n\n  /* =========== init =========== */\n  applyAccent(state.accent || 'gold');\n  applyTheme(state.theme || 'dark');\n  applyI18n(currentLang);\n  applyHeroVariant(state.hero || 'a');\n  syncTweakButtons();\n})();\n\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
